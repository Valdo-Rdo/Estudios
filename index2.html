<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Consulta Horarios Exámenes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f3f4f6; 
            margin: 0; 
            padding: 0; 
        }
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }
        
        /* Estilos del Header y Pestañas Principales */
        .header { background: #1e3a8a; padding: 20px 20px 0 20px; color: white; text-align: center; position: relative; }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        .subtitle { color: #bfdbfe; font-size: 14px; margin-bottom: 20px; }
        
        /* Botón Modo Oscuro */
        .theme-toggle {
            position: absolute; top: 20px; right: 20px;
            background: rgba(255,255,255,0.2); border: none; color: white;
            width: 40px; height: 40px; border-radius: 50%;
            font-size: 20px; cursor: pointer; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center;
        }
        .theme-toggle:hover { background: rgba(255,255,255,0.4); transform: scale(1.1); }
        
        .tabs { display: flex; justify-content: center; gap: 10px; border-bottom: 1px solid #3b82f6; flex-wrap: wrap;}
        .tab-btn { 
            background: rgba(255,255,255,0.1); border: none; color: #bfdbfe; 
            padding: 12px 20px; font-size: 15px; font-weight: bold; 
            border-radius: 12px 12px 0 0; cursor: pointer; transition: all 0.3s;
        }
        .tab-btn.active { background: #f3f4f6; color: #1e3a8a; }
        .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.2); color: white; }

        /* Contenedores de contenido */
        .tab-content { display: none; animation: fadeIn 0.4s; min-height: 60vh; }
        .tab-content.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Buscador General */
        .search-container { position: sticky; top: 10px; z-index: 100; background: #f3f4f6; padding-bottom: 10px; margin-top: 15px;}
        .search-wrapper { position: relative; width: 100%; }
        .search-box { 
            width: 100%; padding: 14px 40px 14px 14px; font-size: 16px; 
            border: 2px solid #3b82f6; border-radius: 12px; box-sizing: border-box; 
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); outline: none; transition: border-color 0.3s; 
        }
        .search-box:focus { border-color: #1d4ed8; }
        .clear-btn {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            cursor: pointer; color: #9ca3af; font-size: 24px; font-weight: bold;
            display: none; user-select: none; transition: color 0.2s;
        }
        .clear-btn:hover { color: #ef4444; }

        /* =========================================
           Botones de Favoritos (Estrellas)
           ========================================= */
        .fav-btn {
            background: none; border: none; cursor: pointer;
            font-size: 24px; color: #cbd5e1; transition: transform 0.2s, color 0.2s;
            float: right; padding: 5px; margin-top: -5px; line-height: 1;
            -webkit-tap-highlight-color: transparent;
        }
        .fav-btn:hover { transform: scale(1.1); }
        .fav-btn.active { color: #f59e0b; }
        
        .section-title { color: #1e3a8a; border-bottom: 2px solid #bfdbfe; padding-bottom: 8px; margin-top: 25px; font-size: 18px;}

        /* =========================================
           Estilos Horario General (Días) 
           ========================================= */
        .day-tabs-wrapper {
            width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch;
            scrollbar-width: none; margin-bottom: 20px; border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px; scroll-behavior: smooth; 
        }
        .day-tabs-wrapper::-webkit-scrollbar { display: none; }
        
        .day-tabs { display: inline-flex; gap: 8px; padding: 0 5px; }
        .day-btn {
            background: #e2e8f0; color: #475569; border: none; padding: 10px 20px;
            border-radius: 25px; font-weight: bold; font-size: 14px; cursor: pointer;
            white-space: nowrap; transition: all 0.2s;
        }
        .day-btn.active { background: #2563eb; color: white; box-shadow: 0 4px 6px rgba(37, 99, 235, 0.3); }
        
        .schedule-card {
            background: white; border-radius: 12px; padding: 0; margin-bottom: 15px;
            border: 1px solid #e5e7eb; border-left: 6px solid #3b82f6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); overflow: hidden;
            max-width: 600px; margin-left: auto; margin-right: auto;
        }
        .schedule-time {
            background: #f8fafc; color: #1e3a8a; font-weight: 800; font-size: 15px;
            padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center;
        }
        .schedule-time .fav-btn { margin: 0; padding: 0; }
        .schedule-details { padding: 12px 16px; }
        
        .class-block {
            background: #f0fdf4; border: 1px solid #bbf7d0; padding: 12px;
            border-radius: 8px; font-size: 14px; color: #166534; margin-bottom: 8px;
            font-weight: 500; line-height: 1.5; position: relative;
        }
        .class-block:last-child { margin-bottom: 0; }
        
        .empty-state { text-align: center; color: #64748b; font-style: italic; padding: 20px; }
        .loader { text-align: center; color: #6b7280; margin-top: 40px; font-style: italic;}

        /* =========================================
           Modo Oscuro
           ========================================= */
        body.dark-mode { background-color: #111827; color: #f9fafb; }
        body.dark-mode .header { background: #172554; } 
        body.dark-mode .tab-btn.active { background: #111827; color: #60a5fa; }
        body.dark-mode .tab-btn:hover:not(.active) { background: rgba(255,255,255,0.1); }
        body.dark-mode .search-container { background: #111827; }
        body.dark-mode .search-box { background: #1f2937; color: white; border-color: #374151; }
        body.dark-mode .search-box:focus { border-color: #3b82f6; }
        body.dark-mode .day-tabs-wrapper { border-color: #374151; }
        body.dark-mode .day-btn { background: #374151; color: #d1d5db; }
        body.dark-mode .day-btn.active { background: #2563eb; color: white; }
        body.dark-mode .schedule-card { background: #1f2937; border-color: #374151; border-left-color: #3b82f6; }
        body.dark-mode .schedule-time { background: #111827; color: #60a5fa; border-color: #374151; }
        body.dark-mode .class-block { background: #064e3b; border-color: #065f46; color: #a7f3d0; }
        body.dark-mode .section-title { color: #60a5fa; border-bottom-color: #1e3a8a; }
        body.dark-mode .fav-btn { color: #475569; }
        body.dark-mode .fav-btn.active { color: #f59e0b; }
    </style>
</head>
<body>

<div class="header">
    <button id="theme-toggle" class="theme-toggle" onclick="toggleTheme()" title="Cambiar modo oscuro">🌙</button>
    <h1>🗓️ Central de Horarios Exámenes Mediateca</h1>
    <p class="subtitle">Consulta y arma tu horario personalizado</p>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="cambiarPestana('tab-general', this)">🏫 Horario General</button>
        <button class="tab-btn" onclick="cambiarPestana('tab-fav', this)">⭐ Mi Horario</button>
    </div>
</div>

<div class="container">
    
    <!-- Pestaña: Horario General -->
    <div id="tab-general" class="tab-content active">
        <div class="search-container">
            <div class="search-wrapper">
                <input type="text" id="buscadorGeneral" class="search-box" placeholder="🔍 Buscar examen en este día..." oninput="filtrarHorarioGeneral()">
                <span id="clear-btn-general" class="clear-btn" onclick="limpiarBusquedaGeneral()" title="Limpiar búsqueda">&times;</span>
            </div>
        </div>
        
        <div id="resultadosGeneral">
            <p class="loader">⏳ Conectando con la programación y separando días...</p>
        </div>
    </div>

    <!-- Pestaña: Mi Horario (Favoritos) -->
    <div id="tab-fav" class="tab-content">
        <div id="mi-horario-contenido">
            <!-- Aquí se inyectan las clases favoritas -->
        </div>
    </div>

</div>

<script>
    // Variables globales
    let datosGeneral = { dias: [], horasData: [] };
    let diaSeleccionadoGeneral = 0;

    // Favoritos almacenados
    let favoritos = JSON.parse(localStorage.getItem('misFavoritos')) || { clases: [] };
    // Validación por si el usuario trae data vieja
    if (!favoritos.clases) favoritos.clases = [];

    // Variables para control de gestos táctiles (swipe)
    let touchStartX = 0;
    let touchEndX = 0;
    let ignorarSwipe = false;

    // URLs
    const urlUdgCSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTc2ntb-bjD-K4QI4LWTAGy33jEMN3ooA_3HKBrUAs212i-dOdBhfTm4D_WOkzfCh2zdCpQChVM_7A7/pub?gid=222378621&single=true&output=csv";

    // Inicializar
    window.onload = function() {
        inicializarTema();
        cargarHorarioGeneral();
        inicializarEventosSwipe();
        renderizarMiHorario();
    };

    /* ==============================================================
       LÓGICA DE MODO OSCURO
       ============================================================== */
    function inicializarTema() {
        const temaGuardado = localStorage.getItem('temaPreferido');
        const prefiereOscuro = window.matchMedia('(prefers-color-scheme: dark)').matches;
        
        if (temaGuardado === 'dark' || (!temaGuardado && prefiereOscuro)) {
            document.body.classList.add('dark-mode');
            document.getElementById('theme-toggle').innerText = '☀️';
        }
    }

    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('theme-toggle');
        body.classList.toggle('dark-mode');
        const esOscuro = body.classList.contains('dark-mode');
        btn.innerText = esOscuro ? '☀️' : '🌙';
        localStorage.setItem('temaPreferido', esOscuro ? 'dark' : 'light');
    }

    // Swipe Events
    function inicializarEventosSwipe() {
        document.addEventListener('touchstart', e => {
            if (e.target.closest('.day-tabs-wrapper')) {
                ignorarSwipe = true;
                return;
            }
            ignorarSwipe = false;
            touchStartX = e.changedTouches[0].screenX;
        }, {passive: true});

        document.addEventListener('touchend', e => {
            if (ignorarSwipe) return;
            touchEndX = e.changedTouches[0].screenX;
            evaluarSwipe();
        }, {passive: true});
    }

    function evaluarSwipe() {
        if (!document.getElementById('tab-general').classList.contains('active') || datosGeneral.dias.length === 0) return;
        const umbralSwipe = 50;
        const diferenciaX = touchEndX - touchStartX;

        if (diferenciaX < -umbralSwipe && diaSeleccionadoGeneral < datosGeneral.dias.length - 1) {
            seleccionarDia(diaSeleccionadoGeneral + 1);
        }
        if (diferenciaX > umbralSwipe && diaSeleccionadoGeneral > 0) {
            seleccionarDia(diaSeleccionadoGeneral - 1);
        }
    }

    function cambiarPestana(tabId, btnElement) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        btnElement.classList.add('active');
    }

    function normalizarTexto(texto) {
        if (!texto) return "";
        return String(texto).toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[´`'"]/g, "");
    }

    function limpiarBusquedaGeneral() {
        document.getElementById('buscadorGeneral').value = '';
        document.getElementById('clear-btn-general').style.display = 'none';
        filtrarHorarioGeneral();
    }

    /* ==============================================================
       LÓGICA GENERAL - Fetch de Datos
       ============================================================== */
    async function fetchYParsear(url, callback) {
        try {
            // Añadir marca de tiempo para evitar el caché del navegador
            const urlSinCache = url + "&nocache=" + new Date().getTime();
            const res = await fetch(urlSinCache, { cache: 'no-store' });
            const text = await res.text();
            
            Papa.parse(text, { 
                header: false, 
                complete: function(results) { 
                    callback(results.data); 
                } 
            });
        } catch (e) {
            console.error("Error al cargar los datos. Revisa tu conexión a internet.", e);
            document.getElementById('resultadosGeneral').innerHTML = '<p class="empty-state">Ocurrió un error al cargar el horario. Intenta recargar la página.</p>';
        }
    }

    /* ==============================================================
       LÓGICA DE FAVORITOS (MI HORARIO)
       ============================================================== */
    function guardarFavoritos() {
        localStorage.setItem('misFavoritos', JSON.stringify(favoritos));
        renderizarMiHorario(); // Actualiza la pestaña Mi Horario en tiempo real
    }

    function limpiarClasesHuerfanas(datosProcesados) {
        const idsValidos = new Set();
        // Recorremos la estructura procesada de clases para recolectar IDs válidos
        datosProcesados.dias.forEach(dia => {
            datosProcesados.horasData.forEach(horaObj => {
                horaObj.filas.forEach(filaCeldas => {
                    dia.columnas.forEach(col => {
                        let contenidoCelda = filaCeldas[col];
                        if(contenidoCelda && contenidoCelda !== "0" && contenidoCelda.length > 2) {
                            if(contenidoCelda.toLowerCase().includes("cargando")) return;
                            let celdaFormateada = contenidoCelda.replace(/\n/g, '<br>');
                            let id = encodeURIComponent(dia.nombre + horaObj.hora + celdaFormateada);
                            idsValidos.add(id);
                        }
                    });
                });
            });
        });

        const totalInicial = favoritos.clases.length;
        // Conservamos solo las clases cuyo ID siga existiendo
        favoritos.clases = favoritos.clases.filter(fav => idsValidos.has(fav.id));

        if (favoritos.clases.length !== totalInicial) {
            guardarFavoritos();
        }
    }

    function toggleFavClase(id, dataJSONEncoded) {
        const index = favoritos.clases.findIndex(c => c.id === id);
        if (index > -1) {
            favoritos.clases.splice(index, 1);
        } else if (dataJSONEncoded) {
            const data = JSON.parse(decodeURIComponent(dataJSONEncoded));
            favoritos.clases.push({ id: id, dia: data.dia, hora: data.hora, materia: data.materia });
        }
        guardarFavoritos();
        renderizarClasesDelDia(diaSeleccionadoGeneral); // Refresca las estrellas en la Pestaña General
    }

    function renderizarMiHorario() {
        const contenedor = document.getElementById('mi-horario-contenido');
        let html = '';

        if (favoritos.clases.length === 0) {
            contenedor.innerHTML = '<p class="empty-state">Aún no has guardado ningun examen. <br><br> Toca la estrella ★ en cualquier examen del <strong>Horario General</strong> para armar tu horario personalizado aquí.</p>';
            return;
        }

        html += '<h2 class="section-title">🏫 Mis Exámenes Guardados</h2>';
        favoritos.clases.forEach(clase => {
            html += `
            <div class="schedule-card" style="margin-bottom: 12px;">
                <div class="schedule-time">
                    <span>🕒 ${clase.dia} | ${clase.hora}</span>
                    <button class="fav-btn active" onclick="toggleFavClase('${clase.id}', '')" title="Quitar de favoritos">★</button>
                </div>
                <div class="schedule-details">
                    <div class="class-block">${clase.materia}</div>
                </div>
            </div>`;
        });

        contenedor.innerHTML = html;
    }

    /* ==============================================================
       LÓGICA HORARIO GENERAL (Sub-pestañas por Día)
       ============================================================== */
    function cargarHorarioGeneral() {
        fetchYParsear(urlUdgCSV, function(datos) {
            datosGeneral = procesarPorDias(datos);
            
            // Limpiar clases que ya no existen en el Google Sheet
            limpiarClasesHuerfanas(datosGeneral);
            
            // Guardar el día que el usuario está viendo actualmente
            const diaActual = diaSeleccionadoGeneral;
            
            construirInterfazDias();
            
            // Restaurar el día exacto que el usuario estaba viendo
            const maxDias = datosGeneral.dias.length > 0 ? datosGeneral.dias.length - 1 : 0;
            diaSeleccionadoGeneral = diaActual > maxDias ? 0 : diaActual;
            
            if(datosGeneral.dias.length > 0) seleccionarDia(diaSeleccionadoGeneral);
            
            // Mantener búsqueda si el usuario estaba tecleando
            const buscadorInput = document.getElementById('buscadorGeneral').value;
            if (buscadorInput.length > 0) filtrarHorarioGeneral();
        });
    }

    function procesarPorDias(filasCSV) {
        let dias = [];
        let filaInicio = 0;
        let horasData = [];

        for(let i = 0; i < filasCSV.length; i++) {
            let textoFila = filasCSV[i].join(" ").toLowerCase();
            if(textoFila.includes("lun") || textoFila.includes("mar") || textoFila.includes("fecha")) {
                let fila = filasCSV[i];
                let diaActual = null;
                
                for(let col = 1; col < fila.length; col++) {
                    let valorCelda = fila[col] ? fila[col].trim() : "";
                    if(valorCelda !== "" && valorCelda.length > 2) {
                        diaActual = { nombre: valorCelda.replace(/\//g, ' '), columnas: [col] };
                        dias.push(diaActual);
                    } else if (diaActual) {
                        diaActual.columnas.push(col);
                    }
                }
                filaInicio = i + 1; 
                break;
            }
        }

        let ultimaHoraVista = "";
        for(let i = filaInicio; i < filasCSV.length; i++) {
            let fila = filasCSV[i];
            let horaStr = fila[0] ? fila[0].trim() : ""; 

            if(horaStr && (horaStr.includes(":") || /\d/.test(horaStr))) ultimaHoraVista = horaStr;
            if(!ultimaHoraVista) continue;
            
            let celdasDeEstaFila = {};
            let tieneDatos = false;
            
            for(let col = 1; col < fila.length; col++) {
                let valor = fila[col] ? fila[col].trim() : "";
                celdasDeEstaFila[col] = valor;
                if(valor !== "" && valor !== "0" && valor.length > 2) tieneDatos = true;
            }
            
            if(tieneDatos) {
                let bloqueHora = horasData.find(h => h.hora === ultimaHoraVista);
                if(!bloqueHora) {
                    bloqueHora = { hora: ultimaHoraVista, filas: [] };
                    horasData.push(bloqueHora);
                }
                bloqueHora.filas.push(celdasDeEstaFila);
            }
        }
        return { dias, horasData };
    }

    function construirInterfazDias() {
        const contenedor = document.getElementById('resultadosGeneral');
        if (datosGeneral.dias.length === 0) {
            contenedor.innerHTML = '<p class="empty-state">No se pudo detectar el formato de días en la tabla.</p>';
            return;
        }

        let html = '<div class="day-tabs-wrapper"><div class="day-tabs">';
        datosGeneral.dias.forEach((dia, index) => {
            let btnClass = index === diaSeleccionadoGeneral ? 'day-btn active' : 'day-btn';
            html += `<button class="${btnClass}" id="btn-dia-${index}" onclick="seleccionarDia(${index})"><i class="fas fa-calendar-day mr-1"></i> ${dia.nombre}</button>`;
        });
        html += '</div></div><div id="contenido-dia-activo"></div>';
        
        contenedor.innerHTML = html;
        renderizarClasesDelDia(diaSeleccionadoGeneral);
    }

    function seleccionarDia(index) {
        diaSeleccionadoGeneral = index;
        document.querySelectorAll('.day-btn').forEach((btn, i) => {
            if (i === index) {
                btn.classList.add('active');
                btn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            } else {
                btn.classList.remove('active');
            }
        });
        renderizarClasesDelDia(index);
    }

    function renderizarClasesDelDia(indexDia) {
        let dia = datosGeneral.dias[indexDia];
        if(!dia) return;

        let contenedor = document.getElementById('contenido-dia-activo');
        let html = '';
        let textoBusqueda = normalizarTexto(document.getElementById('buscadorGeneral').value);
        let coincidencias = 0;

        datosGeneral.horasData.forEach(horaObj => {
            let htmlClases = '';
            let horaTieneClases = false;

            horaObj.filas.forEach(filaCeldas => {
                dia.columnas.forEach(col => {
                    let contenidoCelda = filaCeldas[col];
                    if(contenidoCelda && contenidoCelda !== "0" && contenidoCelda.length > 2) {
                        
                        // Ignorar celdas que digan "Cargando..." en Google Sheets
                        if(contenidoCelda.toLowerCase().includes("cargando")) return;

                        let textoAFiltrar = normalizarTexto(horaObj.hora + " " + contenidoCelda);
                        if(textoBusqueda === "" || textoAFiltrar.includes(textoBusqueda)) {
                            let celdaFormateada = contenidoCelda.replace(/\n/g, '<br>');
                            
                            // Lógica de estrella para clases
                            let dataObj = { dia: dia.nombre, hora: horaObj.hora, materia: celdaFormateada };
                            let id = encodeURIComponent(dia.nombre + horaObj.hora + celdaFormateada);
                            let isFav = favoritos.clases.some(c => c.id === id);
                            
                            horaTieneClases = true;
                            // Si es favorito le agregamos la clase 'active' para que brille
                            let starClass = isFav ? 'fav-btn active' : 'fav-btn';
                            let claseJSON = encodeURIComponent(JSON.stringify(dataObj));

                            htmlClases += `
                            <div class="class-block">
                                <button class="${starClass}" onclick="toggleFavClase('${id}', '${claseJSON}')" title="Guardar en Mi Horario">★</button>
                                ${celdaFormateada}
                            </div>`;
                        }
                    }
                });
            });

            if(horaTieneClases) {
                coincidencias++;
                html += `
                    <div class="schedule-card">
                        <div class="schedule-time">🕒 ${horaObj.hora}</div>
                        <div class="schedule-details">
                            ${htmlClases}
                        </div>
                    </div>
                `;
            }
        });

        if(coincidencias === 0) {
            html = `<p class="empty-state">No hay exámenes disponibles aquí${textoBusqueda ? ' con esa búsqueda' : ''}.</p>`;
        }
        contenedor.innerHTML = html;
    }

    function filtrarHorarioGeneral() {
        const input = document.getElementById('buscadorGeneral');
        const btnClear = document.getElementById('clear-btn-general');
        btnClear.style.display = input.value.length > 0 ? 'block' : 'none';
        renderizarClasesDelDia(diaSeleccionadoGeneral);
    }
</script>

</body>
</html>
