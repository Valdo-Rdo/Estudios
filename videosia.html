    <div id="videoModal" class="hidden fixed inset-0 z-[100] bg-slate-900/95 flex flex-col items-center justify-center p-4 md:p-10 backdrop-blur-sm">
        <button onclick="closeVideo()" class="absolute top-6 right-6 text-white text-4xl hover:text-indigo-400 transition-colors">
            <i class="fa-solid fa-xmark"></i>
        </button>
        
        <div class="w-full max-w-5xl shadow-2xl rounded-2xl overflow-hidden bg-black">
            <video id="modalVideo" src="" controls class="w-full max-h-[80vh]"></video>
        </div>
        
        <h2 id="modalTitle" class="text-white text-2xl font-bold mt-6 text-center"></h2>

    <footer class="bg-white border-t border-slate-200 py-8 text-center mt-auto">
        <p class="text-sm text-slate-500 font-medium">Laboratorio de Innovación Pedagógica | 2026</p>
    </footer>

    <script>
        const modal = document.getElementById('videoModal');
        const modalVideo = document.getElementById('modalVideo');
        const modalTitle = document.getElementById('modalTitle');

        function openVideo(src, title) {
            modalVideo.src = src;
            modalTitle.innerText = title;
            modal.classList.remove('hidden');
            modalVideo.play();
            // Bloquear el scroll de la página de fondo
            document.body.style.overflow = 'hidden';
        }

        function closeVideo() {
            modal.classList.add('hidden');
            modalVideo.pause();
            modalVideo.src = "";
            // Restaurar el scroll
            document.body.style.overflow = 'auto';
        }

        // Cerrar al presionar Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") closeVideo();
        });
    </script>
