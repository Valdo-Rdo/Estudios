<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa Mental - El Viaje de la Energía</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --line-color: #38bdf8;
            --node-bg: #1e293b;
            --node-border: #0ea5e9;
            --text-color: #f8fafc;
            --accent: #10b981;
            --accent-ley: #f59e0b;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .titulo-mapa {
            text-align: center;
            padding: 20px 0;
            margin: 0;
            font-size: 1.8em;
            color: var(--line-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .map-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            height: 800px;
            overflow: hidden;
        }

        svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        line {
            stroke: var(--line-color);
            stroke-width: 3;
            opacity: 0.6;
            stroke-dasharray: 5, 5;
            animation: dash 20s linear infinite;
        }

        @keyframes dash {
            to { stroke-dashoffset: -1000; }
        }

        .node {
            position: absolute;
            transform: translate(-50%, -50%);
            background-color: var(--node-bg);
            border: 2px solid var(--node-border);
            border-radius: 30px;
            padding: 12px 25px;
            font-weight: bold;
            font-size: 1.1em;
            cursor: pointer;
            z-index: 5;
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.4);
            transition: all 0.3s ease;
            text-align: center;
            white-space: nowrap;
        }

        .node:hover {
            transform: translate(-50%, -50%) scale(1.1);
            box-shadow: 0 0 25px rgba(14, 165, 233, 0.8);
            background-color: #2c3e50;
        }

        .node.root { border-color: #f1c40f; box-shadow: 0 0 20px rgba(241, 196, 15, 0.5); }
        .node.renovables { border-color: var(--accent); }
        .node.ley { border-color: var(--accent-ley); }

        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
        }

        .modal-overlay.active { opacity: 1; visibility: visible; }

        .modal-box {
            background: #1e293b;
            border: 2px solid var(--line-color);
            border-radius: 15px;
            padding: 30px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
    </style>
</head>
<body>

    <h2 class="titulo-mapa">🗺️ Red Conceptual: Energía</h2>

    <div class="map-container">
        <svg>
            <line x1="50%" y1="50%" x2="50%" y2="28%" />
            <line x1="50%" y1="28%" x2="25%" y2="12%" />
            <line x1="50%" y1="28%" x2="75%" y2="12%" />
            <line x1="50%" y1="50%" x2="50%" y2="70%" />
            <line x1="50%" y1="70%" x2="20%" y2="88%" />
            <line x1="50%" y1="70%" x2="50%" y2="88%" />
            <line x1="50%" y1="70%" x2="80%" y2="88%" />
            <line x1="50%" y1="50%" x2="22%" y2="50%" />
        </svg>

        <div class="node root" style="top: 50%; left: 50%;" onclick="abrirModal('energia')">⚡ ENERGÍA</div>
        <div class="node renovables" style="top: 28%; left: 50%;" onclick="abrirModal('renovables')">🌱 Fuentes Renovables</div>
        <div class="node renovables" style="top: 12%; left: 25%;" onclick="abrirModal('eolica')">💨 Energía Eólica</div>
        <div class="node renovables" style="top: 12%; left: 75%;" onclick="abrirModal('solar')">☀️ Energía Solar</div>
        <div class="node" style="top: 70%; left: 50%;" onclick="abrirModal('tipos')">💡 Tipos de Energía</div>
        <div class="node" style="top: 88%; left: 20%;" onclick="abrirModal('cinetica')">🏃 Cinética</div>
        <div class="node" style="top: 88%; left: 50%;" onclick="abrirModal('luminica')">🔦 Lumínica</div>
        <div class="node" style="top: 88%; left: 80%;" onclick="abrirModal('electrica')">🔌 Eléctrica</div>
        <div class="node ley" style="top: 50%; left: 22%;" onclick="abrirModal('ley')">⚖️ Conservación</div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-box">
            <div id="modal-title" style="color: #38bdf8; font-size: 1.5em; margin-bottom: 10px;">Título</div>
            <div id="modal-text" style="color: white; margin-bottom: 20px;">Texto aquí</div>
            <button onclick="cerrarModal()" style="padding: 10px 20px; border-radius: 20px; border: none; background: #38bdf8; cursor: pointer;">Entendido</button>
        </div>
    </div>

    <script>
        const diccionario = {
            'energia': { title: 'Energía', text: 'Capacidad para realizar un trabajo.' },
            'renovables': { title: 'Renovables', text: 'Recursos inagotables.' },
            'eolica': { title: 'Eólica', text: 'Energía del viento.' },
            'solar': { title: 'Solar', text: 'Energía del sol.' },
            'tipos': { title: 'Transformaciones', text: 'Diferentes formas de energía.' },
            'cinetica': { title: 'Cinética', text: 'Energía del movimiento.' },
            'luminica': { title: 'Lumínica', text: 'Energía de la luz.' },
            'electrica': { title: 'Eléctrica', text: 'Flujo de electrones.' },
            'ley': { title: 'Conservación', text: 'La energía no se crea ni se destruye.' }
        };

        function abrirModal(id) {
            document.getElementById('modal-title').innerText = diccionario[id].title;
            document.getElementById('modal-text').innerText = diccionario[id].text;
            document.getElementById('modal').classList.add('active');
        }

        function cerrarModal() {
            document.getElementById('modal').classList.remove('active');
        }
    </script>
</body>
</html>
