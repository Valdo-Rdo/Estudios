<!DOCTYPE html>
<html lang="es">
<head>
   <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantillas Universitarias PRO</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;900&display=swap" rel="stylesheet">
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
        /* Estilo para la "hoja de papel" en el modal */
        .paper-effect {
            background-color: #ffffff;
            background-image: linear-gradient(#f1f5f9 1px, transparent 1px);
            background-size: 100% 1.5rem;
            line-height: 1.5rem;
            padding: 1.5rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        html { scroll-behavior: smooth; }
    </style>
</head>
<body>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo, useRef } = React;

        // ==========================================
        // BASE DE DATOS DE PLANTILLAS DE TEXTO
        // ==========================================
        const templatesData = [
            {
                id: 1,
                title: "Ensayo Académico (APA 7)",
                description: "Estructura completa para un ensayo universitario siguiendo los lineamientos de la 7ma edición de APA.",
                category: "Redacción Universitaria",
                icon: "fa-feather",
                color: "bg-blue-600",
                rules: [
                    "Fuente: Times New Roman 12pt o Arial 11pt.",
                    "Interlineado: Doble (2.0) en todo el texto.",
                    "Márgenes: 2.54 cm en todos los lados.",
                    "Sangría: 1.27 cm al inicio de cada párrafo.",
                    "Alineación: Izquierda (no justificado)."
                ],
                templateText: `[Título Completo del Ensayo en Negritas y Centrado]

[Nombre del Estudiante]
[Nombre de la Universidad / Facultad]
[Nombre de la Asignatura]
[Nombre del Profesor]
[Fecha de entrega]

Introducción
[Escribe aquí el párrafo de introducción. Debe captar la atención del lector, presentar el contexto del tema y terminar con la tesis o idea principal que vas a defender en el ensayo.]

Desarrollo (Puedes usar subtítulos en negritas)
[Escribe aquí el cuerpo del ensayo. Cada párrafo debe desarrollar una sola idea principal que apoye tu tesis. Asegúrate de incluir citas (Autor, Año) para respaldar tus argumentos según el formato APA 7.]

[Siguiente párrafo de desarrollo. Utiliza conectores lógicos para que la lectura fluya entre las diferentes ideas.]

Conclusión
[Escribe aquí la conclusión. Resume brevemente los puntos principales expuestos en el desarrollo y reafirma tu tesis demostrando cómo ha sido sustentada. No agregues información nueva aquí.]

Referencias
[Apellido, A. A. (Año). Título del libro en cursiva. Editorial.]
[Apellido, B. B. (Año). Título del artículo. Nombre de la Revista en cursiva, volumen(número), páginas. URL]`
            },
            {
                id: 2,
                title: "Reporte de Lectura",
                description: "Formato estructurado para entregar controles de lectura, identificando tesis, argumentos y opinión personal.",
                category: "Análisis de Textos",
                icon: "fa-book-open-reader",
                color: "bg-emerald-600",
                rules: [
                    "Incluir siempre la ficha bibliográfica al inicio.",
                    "El resumen debe ser objetivo (sin opiniones).",
                    "La crítica debe estar fundamentada en el texto.",
                    "Extensión recomendada: 2 a 3 cuartillas."
                ],
                templateText: `REPORTE DE LECTURA

1. Datos del Alumno
Nombre: [Tu Nombre]
Asignatura: [Nombre de la Asignatura]
Fecha: [Fecha de entrega]

2. Ficha Bibliográfica (Referencia APA)
[Autor, A. A. (Año). Título de la obra. Editorial / Revista. URL si aplica]

3. Glosario de Conceptos Clave
- [Concepto 1]: [Definición breve según el autor]
- [Concepto 2]: [Definición breve según el autor]
- [Concepto 3]: [Definición breve según el autor]

4. Resumen / Ideas Principales (Objetivo)
[Redacta un resumen del texto leído. ¿Cuál es el tema principal? ¿Cuál es la tesis del autor? Menciona los 3 o 4 argumentos más importantes que utiliza el autor para sostener su idea.]

5. Comentario Crítico (Subjetivo)
[Escribe aquí tu opinión sobre la lectura. ¿Estás de acuerdo con el autor? ¿Por qué? ¿Qué aportes hace este texto a la materia que estás estudiando? ¿Hubo alguna limitación o sesgo en la lectura?]`
            },
            {
                id: 3,
                title: "Estructura de Referencias (APA 7)",
                description: "Plantillas rápidas para copiar y rellenar las citas bibliográficas más comunes según APA 7ma Edición.",
                category: "Metodología",
                icon: "fa-quote-right",
                color: "bg-purple-600",
                rules: [
                    "Las referencias van en una página nueva.",
                    "Orden alfabético según el apellido del primer autor.",
                    "Sangría francesa (1.27 cm) a partir de la segunda línea.",
                    "Se incluyen hasta 20 autores antes de usar puntos suspensivos."
                ],
                templateText: `ESTRUCTURAS BASE PARA REFERENCIAS APA 7
(Copia la que necesites y reemplaza los datos entre corchetes)

Libro Impreso:
[Apellido], [Inicial del nombre]. ([Año]). [Título del libro en cursiva]. [Nombre de la Editorial].

Libro en Línea (PDF / E-book):
[Apellido], [Inicial del nombre]. ([Año]). [Título del libro en cursiva]. [Nombre de la Editorial]. https://fr.wikipedia.org/wiki/Digital_Object_Identifier

Capítulo de un Libro Editado:
[Apellido del autor del capítulo], [Inicial]. ([Año]). [Título del capítulo]. En [Inicial del editor]. [Apellido del editor] (Ed.), [Título del libro en cursiva] (pp. [xx-xx]). [Editorial].

Artículo de Revista Científica (Journal):
[Apellido], [Inicial del nombre]. ([Año]). [Título del artículo]. [Nombre de la Revista en cursiva], [Volumen en cursiva]([Número]), [Página inicio]-[Página fin]. https://fr.wikipedia.org/wiki/Digital_Object_Identifier

Página Web:
[Apellido o Nombre de la Organización], [Inicial]. ([Año, Día de Mes]). [Título del artículo o página web en cursiva]. [Nombre del sitio web]. [URL]

Video de YouTube:
[Nombre del Canal]. ([Año, Día de Mes]). [Título del video en cursiva] [Video]. YouTube. [URL]`
            },
            {
                id: 4,
                title: "Carta Descriptiva / Planeación",
                description: "Formato en texto para planear una sesión de clase (Inicio, Desarrollo, Cierre) para prácticas docentes.",
                category: "Docencia",
                icon: "fa-chalkboard-user",
                color: "bg-orange-600",
                rules: [
                    "Redactar los objetivos usando la Taxonomía de Bloom.",
                    "Los tiempos de cada momento deben sumar el total de la clase.",
                    "Especificar claramente los recursos y el método de evaluación."
                ],
                templateText: `PLANEACIÓN DE SESIÓN (CARTA DESCRIPTIVA)

Datos Generales
- Asignatura: [Nombre de la materia]
- Tema de la sesión: [Tema a impartir]
- Nivel Educativo: [Ej. Secundaria / Licenciatura]
- Duración total: [Ej. 50 minutos]
- Objetivo de Aprendizaje: Al finalizar la sesión, el alumno será capaz de [Verbo operativo + contenido + condición].

1. INICIO (Tiempo: [X] min)
- Actividad Docente: [¿Cómo introducirás el tema? Ej. Pregunta detonadora, lluvia de ideas]
- Actividad Alumno: [¿Qué hace el alumno? Ej. Responde preguntas, toma notas]
- Recursos: [Pizarrón, proyector, etc.]

2. DESARROLLO (Tiempo: [X] min)
- Actividad Docente: [Explicación del tema principal, instrucción de la dinámica]
- Actividad Alumno: [Lectura, trabajo en equipos, resolución de ejercicios]
- Recursos: [Copias, marcadores, presentación PPT]

3. CIERRE (Tiempo: [X] min)
- Actividad Docente: [Retroalimentación general, resumen de ideas, asignación de tarea]
- Actividad Alumno: [Dudas finales, entrega de producto]
- Evaluación: [¿Cómo mides que aprendieron? Ej. Lista de cotejo de la actividad, rúbrica, participación]`
            }
        ];

        // Componente Modal de Detalles
        const DetailModal = ({ data, isOpen, onClose }) => {
            const [copied, setCopied] = useState(false);
            const textAreaRef = useRef(null);

            if (!isOpen || !data) return null;

            const handleCopy = () => {
                // Utilizando document.execCommand para compatibilidad en iframes
                const textArea = document.createElement("textarea");
                textArea.value = data.templateText;
                // Evitar scroll visual al añadir el elemento
                textArea.style.position = "absolute";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.select();
                
                try {
                    document.execCommand('copy');
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                } catch (err) {
                    console.error("Error al copiar el texto: ", err);
                    alert("No se pudo copiar el texto automáticamente. Por favor, selecciónalo y cópialo manualmente.");
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/70 backdrop-blur-sm animate-in fade-in duration-300">
                    <div className="bg-white w-full max-w-5xl h-[90vh] rounded-3xl overflow-hidden shadow-2xl flex flex-col md:flex-row animate-in zoom-in-95 duration-300">
                        
                        {/* Panel Izquierdo: Información y Reglas */}
                        <div className={`w-full md:w-1/3 ${data.color} p-8 text-white flex flex-col relative overflow-y-auto shrink-0`}>
                            <div className="absolute top-0 right-0 p-6 opacity-10 transform translate-x-1/4 -translate-y-1/4 pointer-events-none">
                                <i className={`fa-solid ${data.icon} text-[150px]`}></i>
                            </div>
                            
                            <button onClick={onClose} className="absolute top-4 left-4 w-8 h-8 flex items-center justify-center rounded-full bg-black/20 hover:bg-black/40 transition-colors">
                                <i className="fa-solid fa-xmark"></i>
                            </button>

                            <div className="mt-8">
                                <span className="bg-white/20 px-3 py-1 rounded-full text-xs font-bold uppercase tracking-wider">
                                    {data.category}
                                </span>
                                <h2 className="text-3xl font-black leading-tight mt-4 mb-2">{data.title}</h2>
                                <p className="text-sm opacity-90 mb-8">{data.description}</p>
                            </div>

                            <div className="bg-black/10 rounded-2xl p-5 mt-auto">
                                <h4 className="font-bold text-lg mb-3 flex items-center gap-2">
                                    <i className="fa-solid fa-list-check"></i> Reglas del Formato
                                </h4>
                                <ul className="space-y-3 text-sm opacity-90">
                                    {data.rules.map((rule, idx) => (
                                        <li key={idx} className="flex items-start gap-2">
                                            <i className="fa-solid fa-circle-check mt-1 text-xs opacity-70"></i>
                                            <span>{rule}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        </div>
                        
                        {/* Panel Derecho: Área de Texto Copiable */}
                        <div className="w-full md:w-2/3 p-6 md:p-8 bg-slate-50 flex flex-col h-full">
                            <div className="flex justify-between items-center mb-4">
                                <div>
                                    <h3 className="text-xl font-bold text-slate-800">Plantilla de Texto</h3>
                                    <p className="text-sm text-slate-500">Copia y pega este contenido en Word o Google Docs.</p>
                                </div>
                                <button 
                                    onClick={handleCopy}
                                    className={`px-5 py-2.5 rounded-xl font-bold transition-all shadow-md flex items-center gap-2 ${
                                        copied 
                                            ? "bg-green-500 text-white" 
                                            : "bg-slate-800 text-white hover:bg-slate-700 hover:shadow-lg hover:-translate-y-0.5"
                                    }`}
                                >
                                    {copied ? (
                                        <><i className="fa-solid fa-check"></i> ¡Copiado al Portapapeles!</>
                                    ) : (
                                        <><i className="fa-regular fa-copy"></i> Copiar Texto</>
                                    )}
                                </button>
                            </div>

                            {/* La "Hoja de papel" */}
                            <div className="flex-grow overflow-hidden relative rounded-xl shadow-sm border border-slate-200 bg-white">
                                <textarea 
                                    ref={textAreaRef}
                                    readOnly
                                    className="w-full h-full resize-none p-6 paper-effect focus:outline-none text-slate-700 font-mono text-sm leading-relaxed"
                                    value={data.templateText}
                                ></textarea>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [searchTerm, setSearchTerm] = useState("");
            const [activeCategory, setActiveCategory] = useState("Todas");
            const [selectedTemplate, setSelectedTemplate] = useState(null);

            const categories = ["Todas", ...new Set(templatesData.map(t => t.category))];

            const filteredTemplates = useMemo(() => {
                return templatesData.filter(template => {
                    const matchesSearch = template.title.toLowerCase().includes(searchTerm.toLowerCase()) || 
                                          template.description.toLowerCase().includes(searchTerm.toLowerCase());
                    const matchesCategory = activeCategory === "Todas" || template.category === activeCategory;
                    return matchesSearch && matchesCategory;
                });
            }, [searchTerm, activeCategory]);

            return (
                <div className="min-h-screen flex flex-col">
                    {/* HEADER */}
                    <header className="bg-gradient-to-br from-slate-800 to-slate-900 text-white py-12 px-6 shadow-md shrink-0">
                        <div className="max-w-6xl mx-auto">
                            <a href="index.html" className="text-slate-300 hover:text-white flex items-center gap-2 mb-6 transition-colors w-fit font-semibold text-sm">
                                <i className="fa-solid fa-arrow-left"></i> Volver al inicio
                            </a>
                            <div className="flex flex-col md:flex-row md:items-end justify-between gap-6">
                                <div>
                                    <h1 className="text-3xl md:text-4xl font-black tracking-tight mb-2">
                                        <i className="fa-solid fa-copy text-blue-400 mr-3"></i>
                                        Formatos PRO
                                    </h1>
                                    <p className="text-slate-300 text-lg max-w-2xl">Copia estructuras, referencias APA y guías directamente a tus documentos universitarios.</p>
                                </div>
                                
                                <div className="relative w-full md:w-80">
                                    <i className="fa-solid fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500"></i>
                                    <input 
                                        type="text" 
                                        placeholder="Buscar formato (ej. APA, Ensayo)..." 
                                        className="w-full bg-white text-slate-900 rounded-full py-3 pl-11 pr-4 focus:outline-none focus:ring-4 focus:ring-blue-500/30 transition-all shadow-lg text-sm font-medium"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* MAIN CONTENT */}
                    <main className="flex-grow max-w-6xl mx-auto w-full px-6 py-10">
                        
                        {/* Filtros */}
                        <div className="flex flex-wrap gap-2 md:gap-3 mb-10">
                            {categories.map(category => (
                                <button
                                    key={category}
                                    onClick={() => setActiveCategory(category)}
                                    className={`px-4 py-2 rounded-full font-bold text-xs md:text-sm transition-all shadow-sm ${
                                        activeCategory === category 
                                            ? "bg-slate-800 text-white shadow-slate-800/30" 
                                            : "bg-white text-slate-600 hover:bg-slate-100 border border-slate-200"
                                    }`}
                                >
                                    {category}
                                </button>
                            ))}
                        </div>

                        {/* Grid */}
                        {filteredTemplates.length > 0 ? (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {filteredTemplates.map(template => (
                                    <div 
                                        key={template.id} 
                                        onClick={() => setSelectedTemplate(template)}
                                        className="bg-white rounded-2xl p-6 border border-slate-200 shadow-sm hover:shadow-xl transition-all duration-300 flex flex-col group cursor-pointer hover:-translate-y-1"
                                    >
                                        <div className="flex justify-between items-start mb-4">
                                            <div className={`p-3 rounded-xl text-white ${template.color} shadow-inner`}>
                                                <i className={`fa-solid ${template.icon} text-xl w-6 text-center`}></i>
                                            </div>
                                            <span className="bg-slate-100 text-slate-600 text-[10px] font-black uppercase tracking-widest px-3 py-1.5 rounded-full">
                                                {template.category}
                                            </span>
                                        </div>
                                        
                                        <h3 className="text-xl font-black text-slate-800 mb-2 leading-tight group-hover:text-blue-600 transition-colors">
                                            {template.title}
                                        </h3>
                                        
                                        <p className="text-slate-500 text-sm mb-6 flex-grow line-clamp-3">
                                            {template.description}
                                        </p>
                                        
                                        <div className="mt-auto pt-4 border-t border-slate-100 text-center font-bold text-sm text-blue-600 group-hover:text-blue-700 flex justify-between items-center">
                                            <span>Ver formato y copiar</span>
                                            <i className="fa-solid fa-arrow-right-long transform group-hover:translate-x-1 transition-transform"></i>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        ) : (
                            <div className="text-center py-20 bg-white rounded-2xl border border-slate-200 border-dashed">
                                <i className="fa-solid fa-file-circle-xmark text-5xl text-slate-300 mb-4"></i>
                                <h3 className="text-xl font-bold text-slate-700 mb-2">No se encontraron formatos</h3>
                                <p className="text-slate-500">Prueba buscando otro término o categoría.</p>
                                <button 
                                    onClick={() => {setSearchTerm(""); setActiveCategory("Todas");}}
                                    className="mt-4 text-blue-600 font-bold hover:underline"
                                >
                                    Limpiar filtros
                                </button>
                            </div>
                        )}
                    </main>

                    {/* FOOTER */}
                    <footer className="text-center py-8 text-slate-500 text-sm border-t border-slate-200 mt-auto bg-white">
                        <p>Plataforma de Estudio Colaborativo | Formatos Universitarios 2026</p>
                    </footer>

                    {/* MODAL */}
                    <DetailModal 
                        data={selectedTemplate} 
                        isOpen={!!selectedTemplate} 
                        onClose={() => setSelectedTemplate(null)} 
                    />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
