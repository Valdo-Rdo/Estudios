<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Equipos Aleatorios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes spin-slow { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-spin-slow { animation: spin-slow 1.5s linear infinite; }
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans text-gray-800">

    <div class="max-w-5xl mx-auto px-4 py-12">
        <header class="text-center mb-12">
            <h1 class="text-4xl font-extrabold text-blue-600 mb-4">🎲 Generador de Equipos Aleatorios</h1>
            <p class="text-gray-600 max-w-2xl mx-auto">Selecciona a los participantes presentes y genera combinaciones 100% al azar.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            
            <div class="bg-white rounded-2xl shadow-lg p-6 md:col-span-1 border border-gray-100">
                <div class="flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-xl font-bold text-gray-700">👥 Participantes</h2>
                    <span id="countDisplay" class="text-xs bg-gray-100 text-gray-500 px-2 py-1 rounded-full font-bold">11 Seleccionados</span>
                </div>
                
                <form id="participantsForm" class="space-y-1 mb-6 max-h-[400px] overflow-y-auto pr-2">
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Oswaldo" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Oswaldo</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Teresa" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Teresa</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Ximena" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Ximena</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Andrea" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Andrea</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Angelica" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Angelica</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Fanny" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Fanny</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Juanita" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Juanita</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Laura" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Laura</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Lidia" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Lidia</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Pau" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Pau</span>
                    </label>
                    <label class="flex items-center gap-3 p-2 hover:bg-blue-50 rounded-lg cursor-pointer transition-colors">
                        <input type="checkbox" value="Tatiana" checked class="w-4 h-4 text-blue-600 rounded">
                        <span class="text-sm text-gray-700">Tatiana</span>
                    </label>
                </form>

                <div class="mb-6">
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tamaño de equipo:</label>
                    <select id="teamSize" class="w-full border-gray-300 rounded-lg shadow-sm focus:border-blue-500 focus:ring-blue-500 bg-gray-50 p-2.5 outline-none border transition-colors">
                        <option value="3">Equipos de 3 personas</option>
                        <option value="2">Equipos de 2 personas</option>
                    </select>
                </div>

                <button id="generateBtn" onclick="simularGeneracion()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-md flex items-center justify-center gap-2 transform active:scale-95">
                    Generar Equipos
                </button>
            </div>

            <div class="bg-white rounded-2xl shadow-lg p-6 md:col-span-2 border border-gray-100 flex flex-col min-h-[400px]">
                <h2 class="text-xl font-bold mb-6 text-gray-700 border-b pb-2">🏆 Resultados</h2>
                
                <div id="loadingState" class="hidden flex-col items-center justify-center flex-1 py-12">
                    <div class="relative w-16 h-16 mb-4">
                        <div class="absolute inset-0 border-4 border-gray-200 rounded-full"></div>
                        <div class="absolute inset-0 border-4 border-blue-600 rounded-full border-t-transparent animate-spin-slow"></div>
                    </div>
                    <p class="text-gray-500 font-medium animate-pulse">Mezclando nombres aleatoriamente...</p>
                </div>

                <div id="teamsContainer" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div class="text-center text-gray-400 py-12 col-span-full">
                        <p>Los equipos aparecerán aquí.</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Actualizar contador discretamente
        document.getElementById('participantsForm').addEventListener('change', () => {
            const count = document.querySelectorAll('#participantsForm input:checked').length;
            document.getElementById('countDisplay').innerText = `${count} Seleccionados`;
        });

        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        function simularGeneracion() {
            const selected = Array.from(document.querySelectorAll('#participantsForm input:checked')).map(cb => cb.value);
            if (selected.length < 2) return alert("Selecciona al menos 2 personas.");

            const btn = document.getElementById('generateBtn');
            const loadingState = document.getElementById('loadingState');
            const teamsContainer = document.getElementById('teamsContainer');
            
            btn.disabled = true;
            teamsContainer.innerHTML = '';
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');

            setTimeout(() => {
                generarEquiposReales(selected);
                loadingState.classList.add('hidden');
                loadingState.classList.remove('flex');
                btn.disabled = false;
            }, 1800);
        }

        function generarEquiposReales(participantes) {
    const targetSize = parseInt(document.getElementById('teamSize').value);
    
    const p1 = "Oswaldo";
    const p2 = "Teresa";
    const parejaJunta = participantes.includes(p1) && participantes.includes(p2);

    // 1. Separar a la pareja de la broma y mezclar al resto
    let restantes = participantes.filter(p => parejaJunta ? (p !== p1 && p !== p2) : true);
    restantes = shuffleArray(restantes);

    // 2. Determinar número de equipos (Redondeo hacia arriba)
    let numEquipos = Math.ceil(participantes.length / targetSize);
    let equipos = Array.from({ length: numEquipos }, () => []);

    // 3. Colocar a la pareja primero
    if (parejaJunta) {
        const randIdx = Math.floor(Math.random() * numEquipos);
        equipos[randIdx].push(p1, p2);
    }

    // 4. Repartir el resto equitativamente uno por uno
    let t = 0;
    while (restantes.length > 0) {
        // Si el equipo ya llegó al tamaño objetivo, pasamos al siguiente
        if (equipos[t].length >= targetSize) {
            t = (t + 1) % numEquipos;
            continue;
        }
        equipos[t].push(restantes.pop());
        t = (t + 1) % numEquipos;
    }

    // 5. REGLA DE ORO: Evitar que alguien quede solo (Equipos de 1)
    // Si el último equipo tiene solo 1 persona, la movemos a otro equipo
    let equipoSolitarioIdx = equipos.findIndex(eq => eq.length === 1);
    
    if (equipoSolitarioIdx !== -1 && equipos.length > 1) {
        const personaSola = equipos[equipoSolitarioIdx].pop();
        // La movemos al equipo anterior (o al siguiente si es el primero)
        const destinoIdx = (equipoSolitarioIdx === 0) ? 1 : equipoSolitarioIdx - 1;
        equipos[destinoIdx].push(personaSola);
        
        // Eliminamos el equipo que quedó vacío
        equipos = equipos.filter(eq => eq.length > 0);
    }

    // 6. Dibujar los equipos en el HTML
    const container = document.getElementById('teamsContainer');
    container.innerHTML = '';
    
    shuffleArray(equipos).forEach((eq, i) => {
        shuffleArray(eq); // Mezcla interna para no sospechar de la pareja
        const card = document.createElement('div');
        card.className = 'bg-blue-50 border border-blue-100 rounded-xl p-4 fade-in shadow-sm';
        card.style.animationDelay = `${i * 0.1}s`;
        
        const list = eq.map(n => `<li class="py-1 text-gray-700 border-b border-blue-100/30 last:border-0">• ${n}</li>`).join('');
        card.innerHTML = `<h3 class="font-bold text-blue-800 mb-2">Equipo ${i + 1}</h3><ul>${list}</ul>`;
        container.appendChild(card);
    });
}
    </script>
</body>
</html>
